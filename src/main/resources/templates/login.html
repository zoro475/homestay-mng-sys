<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Homestay Booking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
    <style>
        body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg-light); }
        .split-layout { display: flex; width: 100%; min-height: 100vh; }
        .image-section {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?q=80&w=1920&auto=format&fit=crop') center/cover no-repeat;
            display: none;
            position: relative;
        }
        .image-overlay {
            position: absolute; top:0; left:0; right:0; bottom:0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7));
            display: flex; flex-direction: column; justify-content: flex-end; padding: 3rem; color: white;
        }
        .image-overlay h2 { font-size: 2.5rem; margin-bottom: 1rem; }
        .image-overlay p { font-size: 1.1rem; opacity: 0.9; line-height: 1.5; }
        @media (min-width: 900px) { .image-section { display: flex; } }
        
        .form-section {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem;
            background: white;
        }
        .login-card {
            width: 100%; max-width: 400px; animation: fadeInUp 0.5s ease;
        }
        .login-card h2 { margin-bottom: 2rem; color: var(--primary); font-size: 2rem; text-align: center; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #333; }
        .form-control {
            width: 100%; padding: 14px 15px; border: 1px solid var(--border); border-radius: 12px;
            font-size: 1rem; outline: none; background: #f9f9f9; transition: border 0.3s;
        }
        .form-control:focus { border-color: var(--primary); background: white; }
        .btn-submit {
            width: 100%; background: var(--primary); color: white; border: none; padding: 14px;
            border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-top: 1rem; transition: background 0.3s;
        }
        .btn-submit:hover { background: var(--primary-dark); }
        .alert { padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: 500; }
        .alert-error { background-color: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .alert-success { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .back-home { position: absolute; top: 2rem; right: 2rem; color: var(--text-muted); font-weight: 600; font-size: 1.1rem; }
        .back-home:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="split-layout">
        <!-- Cột hình ảnh -->
        <div class="image-section">
            <div class="image-overlay">
                <h2>Khám phá thế giới cùng HomestayBooking</h2>
                <p>Hàng ngàn ưu đãi hấp dẫn và chỗ lưu trú tiện nghi đang chờ đón bạn. Hãy bắt đầu hành trình của bạn ngay hôm nay!</p>
            </div>
        </div>

        <!-- Cột form -->
        <div class="form-section" style="position: relative;">
            <a href="/" class="back-home"><i class="fa-solid fa-xmark"></i></a>
            
            <div class="login-card">
                <h2>Đăng nhập</h2>
                
                <div th:if="${param.error}" class="alert alert-error">
                    Tên đăng nhập hoặc mật khẩu không chính xác.
                </div>
                
                <div th:if="${param.registered}" class="alert alert-success">
                    Đăng ký thành công! Hãy đăng nhập.
                </div>

                <form th:action="@{/login-process}" method="post">
                    <div class="form-group">
                        <label for="username">Tên đăng nhập</label>
                        <input type="text" id="username" name="username" class="form-control" placeholder="Nhập tên đăng nhập của bạn" required autofocus>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required>
                    </div>
                    
                    <button type="submit" class="btn-submit">Đăng nhập</button>
                </form>
                
                <p style="margin-top: 2rem; color: var(--text-muted); text-align: center;">
                    Chưa có tài khoản? <a href="/register" style="color: var(--primary); font-weight: 700;">Đăng ký ngay</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
