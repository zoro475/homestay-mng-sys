<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyến đi của tôi | Homestay Booking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 15px; }
        .page-title { margin-bottom: 2rem; color: var(--text-main); font-size: 2rem; }
        .booking-card { 
            display: flex; gap: 1.5rem; background: white; border-radius: 12px; 
            box-shadow: var(--shadow-sm); margin-bottom: 1.5rem; overflow: hidden;
            border: 1px solid var(--border);
        }
        .booking-img { width: 300px; height: 200px; object-fit: cover; }
        .booking-content { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .booking-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .booking-homestay-name { font-size: 1.25rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.5rem; }
        .booking-details { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 1rem; }
        .booking-details p { margin-bottom: 0.3rem; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }
        .status-paid { background-color: #e8f5e9; color: #2e7d32; }
        .status-unpaid { background-color: #fff3e0; color: #e65100; }
        .empty-state { text-align: center; padding: 4rem 2rem; background: white; border-radius: 12px; }
        .empty-state i { font-size: 4rem; color: #ccc; margin-bottom: 1rem; }
        .booking-actions { align-self: flex-end; }
        .price { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>
    
    <nav class="navbar">
        <a href="/" class="nav-brand"><i class="fa-solid fa-house-chimney"></i> HomestayBooking</a>
        <div class="nav-links">
            <a href="/">Trang chủ</a>
            <a href="/my-bookings" style="color: var(--primary); font-weight: bold;">Chuyến đi</a>
            <span sec:authorize="hasRole('ADMIN')">
                <a href="/admin/dashboard"><i class="fa-solid fa-shield-halved"></i> Quản trị</a>
            </span>
            <span sec:authorize="isAuthenticated()">
                <span style="font-weight: 600; color: var(--primary); margin-right: 1rem;">Chào, <span th:text="${#authentication.name}">User</span></span>
                <a href="/logout" class="btn-login" style="border-color: #ef4444; color: #ef4444;"><i class="fa-solid fa-right-from-bracket"></i> Thoát</a>
            </span>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">Góc chuyến đi của bạn</h1>

        <div th:if="${#lists.isEmpty(bookings)}" class="empty-state">
            <i class="fa-solid fa-plane-slash"></i>
            <h3>Bạn chưa có chuyến đi nào</h3>
            <p style="color: var(--text-muted); margin-top: 10px; margin-bottom: 20px;">Đến lúc để xách balo lên và đi thôi!</p>
            <a href="/" class="btn-search" style="padding: 12px 25px;">Tìm phòng ngay</a>
        </div>

        <div th:each="b : ${bookings}" class="booking-card" th:unless="${#lists.isEmpty(bookings)}">
            <img th:src="${b.homestay.imageUrl != null ? b.homestay.imageUrl : 'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267'}" alt="Homestay" class="booking-img">
            <div class="booking-content">
                <div class="booking-header">
                    <div>
                        <div class="booking-homestay-name" th:text="${b.homestay.name}">Tên Homestay</div>
                        <div style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 10px;">
                            <i class="fa-solid fa-location-dot"></i> <span th:text="${b.homestay.address + ', ' + b.homestay.city}">Địa chỉ</span>
                        </div>
                    </div>
                    <span class="status-badge" th:classappend="${b.paymentStatus == 'PAID'} ? 'status-paid' : 'status-unpaid'" th:text="${b.paymentStatus}">UNPAID</span>
                </div>
                
                <div class="booking-details">
                    <p><i class="fa-regular fa-calendar" style="width:20px"></i> Nhận phòng: <strong><span th:text="${b.checkInDate}"></span></strong></p>
                    <p><i class="fa-regular fa-calendar-check" style="width:20px"></i> Trả phòng: <strong><span th:text="${b.checkOutDate}"></span></strong></p>
                    <p><i class="fa-solid fa-user-group" style="width:20px"></i> Số khách: <span th:text="${b.guestCount}"></span> khách</p>
                    <p><i class="fa-solid fa-tag" style="width:20px"></i> Mã đặt phòng: #<span th:text="${b.id}"></span></p>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                    <div class="price">
                        Tổng cộng: <span th:text="${b.totalPrice != null ? #numbers.formatDecimal(b.totalPrice, 0, 'COMMA', 0, 'POINT') : '0'}"></span>đ
                    </div>
                    <div class="booking-actions">
                        <span th:if="${b.status == 'COMPLETED'}">
                            <a th:href="@{/booking/review/{id}(id=${b.id})}" class="btn-search" style="background:#4caf50; padding:10px 15px; border:none; text-decoration:none; color:white; border-radius:4px;">Đánh giá</a>
                        </span>
                        <span th:if="${b.paymentStatus == 'UNPAID' and b.status != 'CANCELED'}">
                            <a th:href="@{/booking/payment/{id}(id=${b.id})}" class="btn-search" style="background:#ff9800; padding:10px 15px; border:none; text-decoration:none; color:white; border-radius:4px;">Thanh toán ngay</a>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
